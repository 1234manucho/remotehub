{% extends "base.html" %}
{% block title %}Login – RemoteHub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-2xl p-8 shadow-xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Welcome back</h2>
                <p class="text-gray-500 text-sm mt-1">Log in to your RemoteHub account</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input type="email" name="email" id="email" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="you@example.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" name="remember" class="rounded border-gray-300 text-green-600 shadow-sm focus:ring-green-500 mr-2">
                        Remember me
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-green-600 hover:text-green-800 font-medium">Forgot password?</a>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    Sign in
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-gray-500">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="text-green-600 hover:text-green-800 font-medium">Create one</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
