{% extends "base.html" %}
{% block title %}Reset Password – RemoteHub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-2xl p-8 shadow-xl text-center">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-4">Reset your password</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Enter your email and we'll send you a reset link.</p>
            
            <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="email" name="email" required placeholder="you@example.com"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-md">
                    Send Reset Link
                </button>
            </form>
            
            <a href="{{ url_for('auth.login') }}" class="inline-block mt-4 text-sm text-indigo-600 hover:text-indigo-800">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
