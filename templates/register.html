{% extends "base.html" %}
{% block title %}Create Account – RemoteHub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-2xl p-8 shadow-xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Join RemoteHub</h2>
                <p class="text-gray-500 text-sm mt-1">Start your remote career journey</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="Your username">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" id="email" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="you@example.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required minlength="6"
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="At least 6 characters">
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required minlength="6"
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="Repeat your password">
                </div>
                
                <div class="flex items-start">
                    <input type="checkbox" id="terms" required class="mt-1 rounded border-gray-300 text-green-600 shadow-sm focus:ring-green-500">
                    <label for="terms" class="ml-2 text-sm text-gray-600">
                        I agree to the <a href="#" class="text-green-600 hover:underline">Terms of Service</a> and <a href="#" class="text-green-600 hover:underline">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    Create Account
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-gray-500">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}" class="text-green-600 hover:text-green-800 font-medium">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
