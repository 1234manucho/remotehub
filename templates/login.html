{% extends "base.html" %}
{% block title %}Login – RemoteHub{% endblock %}

{% block extra_head %}
<style>
    /* Full‑page background with green gradient */
    .login-page {
        background: linear-gradient(135deg, #0f3e0f 0%, #1a5e1a 40%, #2e7d32 100%);
        position: relative;
        overflow: hidden;
    }

    /* Rotating globe container */
    .globe-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        z-index: 0;
        animation: rotateGlobe 30s linear infinite;
    }

    @keyframes rotateGlobe {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Globe SVG styling */
    .globe-svg {
        width: 100%;
        height: 100%;
        fill: rgba(255,255,255,0.05);
        stroke: rgba(255,255,255,0.15);
        stroke-width: 1;
    }

    /* Card on top of everything */
    .login-card {
        position: relative;
        z-index: 10;
    }

    /* Responsive globe size */
    @media (max-width: 768px) {
        .globe-container {
            width: 300px;
            height: 300px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12 login-page">
    <!-- Rotating Globe (SVG) -->
    <div class="globe-container">
        <svg class="globe-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer circle -->
            <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
            <!-- Equator -->
            <ellipse cx="100" cy="100" rx="90" ry="25" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <!-- Meridians -->
            <line x1="100" y1="10" x2="100" y2="190" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="10" y1="100" x2="190" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="36" y1="28" x2="164" y2="172" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <line x1="164" y1="28" x2="36" y2="172" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <!-- Additional arcs for globe effect -->
            <path d="M20,100 a80,80 0 0,0 160,0" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <path d="M20,100 a80,80 0 0,1 160,0" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <!-- Continents (simplified shapes) -->
            <path d="M70,40 h10 v5 h-5 v5 h-8 v-10z M85,45 h12 v4 h-10 v8 h-5 v-12z M120,50 h15 v6 h-12 v10 h-6 v-16z M140,70 h20 v8 h-18 v12 h-7 v-20z" fill="rgba(255,255,255,0.08)"/>
        </svg>
    </div>

    <!-- Login Card -->
    <div class="w-full max-w-md login-card">
        <div class="glass-card rounded-2xl p-8 shadow-xl bg-white/90 backdrop-blur-sm">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Welcome back</h2>
                <p class="text-gray-500 text-sm mt-1">Log in to your RemoteHub account</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input type="email" name="email" id="email" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="you@example.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" name="remember" checked class="rounded border-gray-300 text-green-600 shadow-sm focus:ring-green-500 mr-2">
                        Remember me
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-green-600 hover:text-green-800 font-medium">Forgot password?</a>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    Sign in
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-gray-500">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="text-green-600 hover:text-green-800 font-medium">Create one</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
