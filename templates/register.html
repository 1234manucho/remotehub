{% extends "base.html" %}
{% block title %}Create Account – RemoteHub{% endblock %}

{% block extra_head %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --rh-green:#14a800;
    --rh-green-dark:#108a00;
    --rh-ink:#001e00;
    --rh-muted:#5e6d55;
    --rh-line:#e4ebe4;
    --rh-bg:#f7faf7;
    --rh-card:#ffffff;
  }
  *{box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--rh-bg);color:var(--rh-ink);margin:0}

  .rh-auth-wrap{
    position:relative;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:40px 20px;overflow:hidden;
    background:
      radial-gradient(1000px 600px at 90% 10%, rgba(20,168,0,.10), transparent 60%),
      radial-gradient(800px 500px at 0% 100%, rgba(20,168,0,.08), transparent 60%),
      linear-gradient(180deg,#f3f8f3,#eaf3ea);
  }

  /* Rotating globe */
  .rh-globe{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:0;
    width:820px;height:820px;max-width:110vw;max-height:110vw;opacity:.45;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,.85), rgba(255,255,255,0) 45%),
      radial-gradient(circle at 70% 70%, rgba(20,168,0,.35), rgba(20,168,0,0) 55%),
      conic-gradient(from 0deg, #d6efd6, #b9e3b9, #a5dca5, #c8e9c8, #d6efd6);
    box-shadow:inset -40px -60px 120px rgba(0,40,0,.25), 0 30px 80px rgba(0,60,0,.15);
    animation:rh-spin 60s linear infinite;
  }
  .rh-globe::before,.rh-globe::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(ellipse 90px 40px at 25% 30%, rgba(16,138,0,.55), transparent 60%),
      radial-gradient(ellipse 140px 60px at 60% 45%, rgba(16,138,0,.5), transparent 60%),
      radial-gradient(ellipse 70px 35px at 75% 70%, rgba(16,138,0,.55), transparent 60%),
      radial-gradient(ellipse 110px 50px at 35% 75%, rgba(16,138,0,.45), transparent 60%);
    mix-blend-mode:multiply;
  }
  .rh-globe::after{
    background:
      repeating-linear-gradient(90deg, rgba(0,40,0,.06) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(0deg, rgba(0,40,0,.05) 0 1px, transparent 1px 60px);
    opacity:.6;
  }
  @keyframes rh-spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

  /* Card */
  .rh-card{
    position:relative;z-index:2;width:100%;max-width:480px;
    background:var(--rh-card);border:1px solid var(--rh-line);border-radius:20px;
    box-shadow:0 30px 80px rgba(0,30,0,.18);overflow:hidden;
    padding:48px 44px;
  }

  .rh-card h1{
    font-size:26px;font-weight:800;margin:0 0 6px;color:var(--rh-ink)
  }
  .rh-card .sub{color:var(--rh-muted);margin:0 0 26px;font-size:14.5px}

  .rh-field{margin-bottom:16px}
  .rh-field label{display:block;font-size:13px;font-weight:600;color:var(--rh-ink);margin-bottom:6px}
  .rh-input-wrap{position:relative}
  .rh-input-wrap > i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--rh-muted);font-size:14px}
  .rh-field input{
    width:100%;padding:12px 14px 12px 42px;border:1.5px solid var(--rh-line);border-radius:10px;
    font-size:15px;font-family:inherit;color:var(--rh-ink);background:#fff;transition:.2s;
  }
  .rh-field input:focus{outline:none;border-color:var(--rh-green);box-shadow:0 0 0 4px rgba(20,168,0,.12)}
  .rh-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--rh-muted);cursor:pointer;padding:6px}

  .rh-check{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:var(--rh-muted);margin:6px 0 18px;line-height:1.5}
  .rh-check input{accent-color:var(--rh-green);margin-top:3px}
  .rh-check a{color:var(--rh-green);font-weight:600;text-decoration:none}
  .rh-check a:hover{text-decoration:underline}

  .rh-btn{
    width:100%;padding:13px;border:none;border-radius:10px;background:var(--rh-green);color:#fff;
    font-size:15px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .rh-btn:hover{background:var(--rh-green-dark);transform:translateY(-1px);box-shadow:0 10px 24px rgba(20,168,0,.3)}

  .rh-foot{text-align:center;color:var(--rh-muted);font-size:14px;margin-top:22px}
  .rh-foot a{color:var(--rh-green);font-weight:700;text-decoration:none}
  .rh-foot a:hover{text-decoration:underline}

  @media (max-width:480px){
    .rh-auth-wrap{padding:20px 12px}
    .rh-card{padding:34px 26px}
    .rh-card h1{font-size:22px}
  }
</style>
{% endblock %}

{% block content %}
<div class="rh-auth-wrap">
  <div class="rh-globe"></div>

  <div class="rh-card">
    <h1>Join RemoteHub</h1>
    <p class="sub">Start your remote career journey</p>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <div class="rh-field">
        <label for="username">Username</label>
        <div class="rh-input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="username" name="username" placeholder="yourusername" required>
        </div>
      </div>

      <div class="rh-field">
        <label for="email">Email</label>
        <div class="rh-input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>
      </div>

      <div class="rh-field">
        <label for="password">Password</label>
        <div class="rh-input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Create a strong password" required>
          <button type="button" class="rh-toggle" onclick="rhTogglePw('password', this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <div class="rh-field">
        <label for="confirm_password">Confirm Password</label>
        <div class="rh-input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
          <button type="button" class="rh-toggle" onclick="rhTogglePw('confirm_password', this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <label class="rh-check">
        <input type="checkbox" name="agree" required>
        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
      </label>

      <button type="submit" class="rh-btn"><i class="fas fa-user-plus"></i> Create Account</button>
    </form>

    <p class="rh-foot">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
</div>

<script>
  function rhTogglePw(id, btn){
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if(input.type === 'password'){ input.type='text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    else { input.type='password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
  }
</script>
{% endblock %}
